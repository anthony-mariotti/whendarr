name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: 'release-${{ github.ref }}'
  cancel-in-progress: false

env:
  PNPM_VERSION: 9.12.3
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/whendarr
  HUSKY: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
            node-version: 24
            cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check

  check-release:
    runs-on: ubuntu-latest
    needs: [lint]
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - id: check
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Pre-Release Detected: $TAG"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Stable Release Detected"
          fi

  build-docker:
    runs-on: ${{ matrix.runner }}
    needs: [check-release]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
        #   - platform: linux/arm64
        #     runner: ubuntu-24.04-arm
        #     arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
            node-version: 24
            cache: pnpm
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
          build-args: |
           APP_VERSION=${{ github.ref_name }}
           APP_TAG=${{ github.ref_name }}
           APP_COMMIT=${{ github.sha }}
           APP_BUILD_DATE=${{ github.event.head_commit.timestamp }}
           CACHE_BUST=${{ github.sha }}
      - uses: actions/upload-artifact@v6
        with:
          name: digests-docker-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  create-release:
    runs-on: ubuntu-latest
    needs: [check-release, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: tag-info
        run: |
          SUBJECT=$(git tag -l --format='%(contents:subject)' ${{ github.ref_name }})
          BODY=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          if [ -n "$BODY" ]; then
            printf '%s\n\n%s\n' "$SUBJECT" "$BODY" > tag_message.txt
          else
            echo "$SUBJECT" > tag_message.txt
          fi
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: tag_message.txt
          prerelease: ${{ needs.check-release.outputs.prerelease }}
          generate_release_notes: false
